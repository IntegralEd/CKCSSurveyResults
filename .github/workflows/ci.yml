name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: lint / typecheck / build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        # Routes are force-dynamic, so no live Airtable creds are required for
        # a production build. Passing empty values so getBase() fails loudly
        # if any new code starts calling Airtable at build time.
        env:
          AIRTABLE_API_KEY: ''
          AIRTABLE_BASE_ID: ''
        run: npm run build
