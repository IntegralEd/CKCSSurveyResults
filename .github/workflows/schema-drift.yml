name: Airtable schema drift

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  verify-schema:
    name: Verify committed schema matches Airtable
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify schema snapshot
        env:
          # AIRTABLE_PAT is the shared read-only secret (schema + records
          # across the three project bases). The sync script reads
          # AIRTABLE_API_KEY, so we just alias it here.
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_PAT }}
          # Base defaults to the CKCS Report base; override with a repo
          # variable named AIRTABLE_BASE_ID to point at a different base.
          AIRTABLE_BASE_ID: ${{ vars.AIRTABLE_BASE_ID || 'app8bFS8L3YQAmFzz' }}
        run: npm run schema:verify
